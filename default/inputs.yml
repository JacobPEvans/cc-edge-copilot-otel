inputs:
  copilot-chat-otel:
    disabled: false
    sendToRoutes: true
    pqEnabled: false
    streamtags:
      - vct
      - otel
    host: 0.0.0.0
    port: 4317
    tls:
      disabled: true
    protocol: grpc
    extractSpans: true
    extractMetrics: false
    otlpVersion: 1.3.1
    authType: none
    maxActiveCxn: 1000
    extractLogs: false
    type: open_telemetry
    metadata:
      - name: datatype
        value: "'copilot-chat-otel'"
